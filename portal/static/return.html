<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>支付结果 - AI Proxy Portal</title>
    <link rel="stylesheet" href="../static/styles.css?v=20260617-portal-38" />
  </head>
  <body class="center-page">
    <article class="result-card">
      <span class="brand-mark">AI</span>
      <h1>正在确认支付结果</h1>
      <p>订单号：<code id="orderNo">__ORDER_NO__</code></p>
      <p id="message">支付平台回跳已收到，正在等待异步通知激活 Key。</p>
      <a href="../" class="button-link">返回门户</a>
    </article>
    <script>
      const orderNo = "__ORDER_NO__";
      async function poll() {
        const res = await fetch(`../api/orders/${orderNo}`);
        const data = await res.json();
        if (data.order?.status === "paid") {
          document.getElementById("message").textContent = "交易完成，Key 已激活，通知邮件已发送或排队。";
          return;
        }
        setTimeout(poll, 3000);
      }
      poll();
    </script>
  </body>
</html>
